<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign In — Reservation</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }
        .card {
            background: #fff; border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,.12);
            padding: 2.5rem 2rem; width: 100%; max-width: 400px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #111; }
        .alert { border-radius: 4px; padding: .75rem 1rem; margin-bottom: 1rem; font-size: .9rem; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        label { display: block; font-size: .875rem; margin-bottom: .25rem; color: #333; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: .5rem .75rem; border: 1px solid #ccc;
            border-radius: 4px; font-size: 1rem; margin-bottom: 1rem;
        }
        input:focus { outline: none; border-color: #0d6efd; box-shadow: 0 0 0 3px rgba(13,110,253,.15); }
        button[type="submit"] {
            width: 100%; padding: .65rem; background: #0d6efd; color: #fff;
            border: none; border-radius: 4px; font-size: 1rem; cursor: pointer;
        }
        button[type="submit"]:hover { background: #0b5ed7; }
    </style>
</head>
<body>
<div class="card">
    <h1>Sign In</h1>

    <div th:if="${activated}" class="alert alert-success">
        Your account has been activated. You can now sign in.
    </div>
    <div th:if="${activationError}" class="alert alert-error">
        The activation link is invalid or has already been used.
    </div>
    <div th:if="${activationExpired}" class="alert alert-error">
        The activation link has expired. Please register again to receive a new link.
    </div>
    <div th:if="${loginError}" class="alert alert-error">
        Incorrect username or password.
    </div>

    <form th:action="@{/login}" method="post">
        <label for="username">Email</label>
        <input type="text" id="username" name="username" autocomplete="username" required/>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required/>
        <button type="submit">Sign In</button>
    </form>
</div>
</body>
</html>
