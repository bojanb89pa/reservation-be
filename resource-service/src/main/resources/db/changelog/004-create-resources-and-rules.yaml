databaseChangeLog:
  - changeSet:
      id: 004
      author: Bojan Bogojevic
      changes:
        - createTable:
            tableName: resources
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: public_id
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: business_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: resources
            baseColumnNames: business_id
            referencedTableName: businesses
            referencedColumnNames: id
            constraintName: fk_resources_businesses
            onDelete: CASCADE

        - sql:
            splitStatements: false
            sql: |
              ALTER TABLE reservations DROP CONSTRAINT IF EXISTS no_overlapping_reservations;
        - dropForeignKeyConstraint:
            baseTableName: reservations
            constraintName: fk_reservations_businesses
        - dropColumn:
            tableName: reservations
            columnName: business_id
        - addColumn:
            tableName: reservations
            columns:
              - column:
                  name: resource_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: reservations
            baseColumnNames: resource_id
            referencedTableName: resources
            referencedColumnNames: id
            constraintName: fk_reservations_resources
        - sql:
            splitStatements: false
            sql: |
              ALTER TABLE reservations
              ADD CONSTRAINT no_overlapping_reservations
              EXCLUDE USING gist (
                resource_id WITH =,
                tstzrange(start_time, end_time) WITH &&
              );

        - createTable:
            tableName: resource_availability_rules
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: public_id
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: resource_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: day_of_week
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: start_time
                  type: TIME
                  constraints:
                    nullable: false
              - column:
                  name: end_time
                  type: TIME
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: resource_availability_rules
            baseColumnNames: resource_id
            referencedTableName: resources
            referencedColumnNames: id
            constraintName: fk_resource_availability_rules_resources
            onDelete: CASCADE
